<!DOCTYPE html>
<html>
<head>
    <title>Student-Feedback</title>
</head>

    <style>
        .container {
            background: white;
            padding: 40px;
            border: 1px solid #ccc;
            width: 350px;
            margin: auto;
        }
        input, select, textarea {
            width: 100%;
            margin-top: 5px;
            margin-bottom: 10px;
            padding:10px;
        }
        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
        }
        input[type="submit"] { 
            background: #007bff; 
            color: #fff;
            border: none; 
            padding: 10px; 
            cursor: pointer;
        }
        footer {
            text-align: center; 
            padding: 10px; 
            background-color: black; 
            color: white; 
            margin-top: 50px;
        }
    </style>

<body>
    <div class="container">
        <h1>Student-Feedback form</h1>
        <form>
            <label for="fname">Full Name:</label>
            <input type="text" id="fname" name="fullname" placeholder="Your name">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="emailid" placeholder="Your E-mail id">
            <label for="usn">USN:</label>
            <input type="text" id="usn" name="USN" placeholder="Your USN">
            <label for="sem">Select Semester:</label>
            <select name="sem">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
            </select>
            <label>Branch:</label><br>
            <input type="radio" name="branch" value="CS">Computer Science and Engineering<br>
            <input type="radio" name="branch" value="IS">Information Science<br>
            <input type="radio" name="branch" value="EC">Electronics and Communication<br>
            <input type="radio" name="branch" value="NCB">Non-Circuit Branch<br>
            <label for="feedback">Feedback:</label>
            <textarea rows="6" cols="50" name="feedback" placeholder="Your Feedback & Suggestions"></textarea>
            <input type="checkbox">
            <label>Send me a copy of this Feedback</label><br>
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
<footer>
    <p >&copy; JSS Science and Technology University</p>
</footer>
</html>
